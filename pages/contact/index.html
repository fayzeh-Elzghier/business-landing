<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="Contact Nova Studio" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nova Studio | Contact</title>

    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/contact.css" />
  </head>

  <body>
    <header class="site-header">
      <nav class="navbar" aria-label="Primary">
        <a class="brand" href="../../index.html">Nova Studio</a>

        <ul class="nav-links">
          <li><a href="../../index.html">Home</a></li>
          <li><a href="./index.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>

      <section class="page-hero">
        <h1>Contact us</h1>
        <p>Send a message and we’ll get back to you soon.</p>
      </section>
    </header>

    <main class="section">
      <form class="contact-form" action="#" method="post">
        <div class="form-row">
          <label for="full-name">Full name</label>
          <input id="full-name" name="full-name" type="text" placeholder="Your name" required />
        </div>

        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-row">
          <label for="topic">Topic</label>
          <select id="topic" name="topic" required>
            <option value="" selected disabled>Choose one</option>
            <option value="landing">Landing page</option>
            <option value="redesign">Redesign</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-row">
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            placeholder="Tell us what you need..."
            required
          ></textarea>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Submit</button>
          <a class="btn btn-outline" href="../../index.html">Back to Home</a>
        </div>
      </form>
    </main>

    <footer class="site-footer">
      <p>
        <strong>Nova Studio</strong>
        <span class="dot">•</span>
        <a href="../../index.html">Home</a>
      </p>
    </footer>
  </body>
</html>
